<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fire System - Professional POS</title>
    <style>
        :root {
            --primary-blue: #005A9E;
            --bg-gray: #f3f2f1;
            --border-color: #d2d0ce;
            --text-main: #323130;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-gray);
            color: var(--text-main);
            margin: 0;
            overflow: hidden; 
            user-select: none;
        }

        .top-nav {
            background: #fff;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 20px;
            height: 40px;
        }

        .system-title { font-weight: 700; color: var(--primary-blue); font-size: 16px; }

        .nav-tabs { display: flex; gap: 10px; }
        .tab-link {
            padding: 8px 15px;
            cursor: pointer;
            font-size: 13px;
            border-bottom: 2px solid transparent;
        }
        .tab-link.active { border-bottom: 2px solid var(--primary-blue); font-weight: 600; }

        .logout-small {
            font-size: 11px;
            color: #a80000;
            cursor: pointer;
            text-decoration: underline;
        }

        .content-area { padding: 15px; height: calc(100vh - 70px); overflow-y: auto; }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
            font-size: 13px;
            margin-top: 10px;
        }
        th { background: #faf9f8; text-align: left; padding: 8px; border: 1px solid var(--border-color); }
        td { padding: 6px 8px; border: 1px solid var(--border-color); }

        .input-bar { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
        input { 
            padding: 8px 10px; 
            border: 1px solid var(--border-color); 
            border-radius: 4px; 
            font-size: 13px;
            width: 100%;
            box-sizing: border-box;
        }
        input:focus { outline: none; border-color: var(--primary-blue); }

        button {
            padding: 8px 15px;
            background: var(--primary-blue);
            color: white;
            border: none;
            cursor: pointer;
            font-size: 13px;
            border-radius: 4px;
            font-weight: 600;
            width: 100%;
            transition: 0.2s;
        }
        button:hover { background: #004578; }
        button:disabled { background: #a19f9d; cursor: not-allowed; }

        .modal {
            display: none;
            position: fixed;
            top: 20%;
            left: 50%;
            transform: translate(-50%, -20%);
            width: 400px;
            background: white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            border-radius: 4px;
            padding: 15px;
            z-index: 1000;
        }
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3);
            z-index: 999;
        }

        .hidden { display: none !important; }
        
        .login-wrap {
            height: 100vh; display: flex; justify-content: center; align-items: center;
        }
        .login-card { 
            background: white; 
            padding: 25px; 
            border: 1px solid var(--border-color); 
            width: 320px; 
            border-radius: 8px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
        }

        /* ستايل التبويبات بتاعت الدخول والإنشاء */
        .auth-nav {
            display: flex;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 20px;
        }
        .auth-tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            cursor: pointer;
            color: #605e5c;
            font-weight: 600;
            font-size: 14px;
            border-bottom: 2px solid transparent;
        }
        .auth-tab.active {
            color: var(--primary-blue);
            border-bottom: 2px solid var(--primary-blue);
        }

        .alert-box {
            color: white; 
            padding: 8px; 
            font-size: 12px; 
            margin-bottom: 15px; 
            display: none; 
            border-radius: 4px; 
            text-align: center;
        }

        .suffix-text { font-size: 11px; display: block; margin-bottom: 15px; color: #888; margin-top: -5px;}
        .input-group { margin-bottom: 15px; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="loginPage" class="login-wrap">
        <div class="login-card">
            
            <div class="auth-nav">
                <div id="tabLogin" class="auth-tab active" onclick="switchAuthTab('login')">Login</div>
                <div id="tabRegister" class="auth-tab" onclick="switchAuthTab('register')">Create Account</div>
            </div>

            <div id="authAlert" class="alert-box"></div>
            
            <div id="loginForm">
                <div class="input-group">
                    <input type="text" id="loginUser" placeholder="Username" autocomplete="off">
                    <span class="suffix-text">@firesystem.com</span>
                </div>
                <div class="input-group">
                    <input type="password" id="loginPass" placeholder="Password">
                </div>
                <button id="loginBtn" onclick="processAuth()">Login to System</button>
            </div>

            <div id="registerForm" class="hidden">
                <div class="input-group">
                    <input type="text" id="regUser" placeholder="New Username" autocomplete="off">
                    <span class="suffix-text">@firesystem.com</span>
                </div>
                <div class="input-group">
                    <input type="password" id="regPass" placeholder="New Password (Min 6 chars)">
                </div>
                <button id="regBtn" onclick="processRegister()" style="background-color: #107c10;">Create & Login</button>
            </div>

        </div>
    </div>

    <div id="mainSystem" class="hidden">
        <nav class="top-nav">
            <div class="system-title">FIRE SYSTEM v1.0</div>
            <div class="nav-tabs">
                <div class="tab-link active" onclick="showTab('pos')">Home (Sales)</div>
                <div class="tab-link" onclick="showTab('stock')">Inventory (Stock)</div>
            </div>
            <div class="logout-small" onclick="confirmLogout()">Logout</div>
        </nav>

        <div class="content-area">
            <div id="posTab">
                <div class="input-bar" style="width: 400px;">
                    <input type="text" id="sellInput" placeholder="Scan Barcode / Code (Enter)">
                    <span style="font-size:11px; color:#666; width: 150px;">Press <b>Ctrl + S</b> to search</span>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>Code</th>
                            <th>Product Name</th>
                            <th>Time</th>
                        </tr>
                    </thead>
                    <tbody id="salesTableBody"></tbody>
                </table>
            </div>

            <div id="stockTab" class="hidden">
                <div class="input-bar" style="width: 500px;">
                    <input type="text" id="pCode" placeholder="Code">
                    <input type="text" id="pName" placeholder="Name">
                    <input type="number" id="pQty" placeholder="Qty">
                    <button onclick="updateStock()" style="width: 150px;">Update Stock</button>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>Item Code</th>
                            <th>Item Name</th>
                            <th>Current Stock</th>
                        </tr>
                    </thead>
                    <tbody id="stockTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="searchOverlay" class="modal-overlay" onclick="closeSearch()"></div>
    <div id="searchModal" class="modal">
        <h4 style="margin:0 0 10px 0">Quick Search</h4>
        <input type="text" id="modalSearchInput" placeholder="Search by name or code...">
        <div id="searchResults" style="max-height: 200px; overflow-y: auto; font-size: 12px; margin-top:10px"></div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, updateDoc, increment, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCVWN1_9_9uNXBfwFpPJUZMSS17cvTQUV4",
        authDomain: "fire-system-4a0c3.firebaseapp.com",
        projectId: "fire-system-4a0c3",
        storageBucket: "fire-system-4a0c3.firebasestorage.app",
        messagingSenderId: "34578512308",
        appId: "1:34578512308:web:d05b93e97cbe0fe30bdae1",
        measurementId: "G-TNHMC7Z65N"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // التنقل بين الشاشات
    window.showTab = (tab) => {
        document.getElementById('posTab').classList.toggle('hidden', tab !== 'pos');
        document.getElementById('stockTab').classList.toggle('hidden', tab !== 'stock');
        document.querySelectorAll('.tab-link').forEach(el => el.classList.toggle('active', el.innerText.toLowerCase().includes(tab)));
    };

    window.confirmLogout = () => {
        if(confirm("Are you sure you want to log out?")) {
            signOut(auth).then(() => { location.reload(); });
        }
    };

    // التنقل بين تبويبات الدخول وإنشاء الحساب
    window.switchAuthTab = (tab) => {
        document.getElementById('loginForm').classList.toggle('hidden', tab !== 'login');
        document.getElementById('registerForm').classList.toggle('hidden', tab !== 'register');
        document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
        document.getElementById('tabRegister').classList.toggle('active', tab === 'register');
        document.getElementById('authAlert').style.display = 'none'; // مسح أي رسايل خطأ قديمة
    };

    function showAlert(msg, color) {
        const box = document.getElementById('authAlert');
        box.innerText = msg;
        box.style.backgroundColor = color;
        box.style.display = 'block';
    }

    // تسجيل الدخول
    window.processAuth = async () => {
        const uField = document.getElementById('loginUser').value.trim();
        const pField = document.getElementById('loginPass').value;
        const btn = document.getElementById('loginBtn');

        if (!uField || !pField) {
            showAlert("Please enter both Username and Password.", "#d13438");
            return;
        }

        // قفل الزرار عشان ميتداسش مرتين
        btn.disabled = true;
        btn.innerText = "Please wait...";
        showAlert("Connecting to server...", "#0078D4");

        try {
            await signInWithEmailAndPassword(auth, uField + "@firesystem.com", pField);
            // لو نجح مش محتاج أفتح الزرار تاني عشان هينقله للصفحة اللي بعدها
        } catch (error) { 
            btn.disabled = false;
            btn.innerText = "Login to System";
            if (error.code === 'auth/invalid-credential' || error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password') {
                showAlert("Login Failed: Incorrect username or password.", "#d13438");
            } else {
                showAlert("Error: " + error.message, "#d13438"); 
            }
        }
    };

    // إنشاء حساب جديد
    window.processRegister = async () => {
        const uField = document.getElementById('regUser').value.trim();
        const pField = document.getElementById('regPass').value;
        const btn = document.getElementById('regBtn');

        if (!uField || !pField) {
            showAlert("Enter Username and Password to create account.", "#d13438");
            return;
        }
        if (pField.length < 6) {
            showAlert("Password must be at least 6 characters.", "#d13438");
            return;
        }

        // قفل الزرار
        btn.disabled = true;
        btn.innerText = "Creating account...";
        showAlert("Setting up your workspace...", "#0078D4");

        try { 
            await createUserWithEmailAndPassword(auth, uField + "@firesystem.com", pField); 
            // مش محتاجين نرجع الزرار لأصله لأنه هيدخل على السيستم أوتوماتيك
        } catch (error) { 
            btn.disabled = false;
            btn.innerText = "Create & Login";
            if(error.code === 'auth/email-already-in-use') {
                showAlert("This Username already exists! Go to Login tab.", "#d13438");
            } else {
                showAlert("Error: " + error.message, "#d13438"); 
            }
        }
    };

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('mainSystem').classList.remove('hidden');
            document.getElementById('sellInput').focus();
            loadStockRealtime();
        }
    });

    // POS و المخزن (زي ما هما شغالين تمام)
    window.sellItem = async () => {
        const code = document.getElementById('sellInput').value.trim();
        if(!code) return;
        const ref = doc(db, "inventory", code);
        try {
            const snap = await getDoc(ref);
            if(snap.exists() && snap.data().quantity > 0) {
                await updateDoc(ref, { quantity: increment(-1) });
                addToSalesTable(code, snap.data().name);
            } else { alert("Product out of stock or not found."); }
        } catch(e) { console.error(e); }
        document.getElementById('sellInput').value = '';
        document.getElementById('sellInput').focus();
    };

    function addToSalesTable(code, name) {
        const row = `<tr><td>${code}</td><td>${name}</td><td>${new Date().toLocaleTimeString()}</td></tr>`;
        document.getElementById('salesTableBody').insertAdjacentHTML('afterbegin', row);
    }

    function loadStockRealtime() {
        onSnapshot(collection(db, "inventory"), (querySnapshot) => {
            const tbody = document.getElementById('stockTableBody');
            tbody.innerHTML = '';
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                tbody.innerHTML += `<tr><td>${doc.id}</td><td>${data.name}</td><td>${data.quantity}</td></tr>`;
            });
        });
    }

    window.updateStock = async () => {
        const c = document.getElementById('pCode').value.trim();
        const n = document.getElementById('pName').value.trim();
        const q = parseInt(document.getElementById('pQty').value);
        if(c && n && !isNaN(q)) {
            await setDoc(doc(db, "inventory", c), { name: n, quantity: q }, {merge: true});
            document.getElementById('pCode').value = ''; 
            document.getElementById('pName').value = ''; 
            document.getElementById('pQty').value = '';
            document.getElementById('pCode').focus();
        } else { alert("Please fill all fields correctly."); }
    };

    // اختصارات الكيبورد
    document.addEventListener('keydown', (e) => {
        if (e.keyCode == 123) e.preventDefault();
        if (e.ctrlKey && e.key === 's') { e.preventDefault(); openSearch(); }
    });

    document.getElementById('sellInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') sellItem(); });
    document.getElementById('loginPass').addEventListener('keypress', (e) => { if(e.key === 'Enter') processAuth(); });
    document.getElementById('regPass').addEventListener('keypress', (e) => { if(e.key === 'Enter') processRegister(); });
    document.getElementById('pQty').addEventListener('keypress', (e) => { if(e.key === 'Enter') updateStock(); });

    function openSearch() {
        document.getElementById('searchOverlay').style.display = 'block';
        document.getElementById('searchModal').style.display = 'block';
        document.getElementById('modalSearchInput').focus();
    }
    window.closeSearch = () => {
        document.getElementById('searchOverlay').style.display = 'none';
        document.getElementById('searchModal').style.display = 'none';
    };
</script>
</body>
</html>
