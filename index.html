<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fire System - نظام فايـر الاحترافي</title>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <style>
        :root { --primary-blue: #005A9E; --bg-gray: #f3f2f1; --border-color: #d2d0ce; --text-main: #323130; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-gray); color: var(--text-main); margin: 0; overflow: hidden; user-select: none; }
        .top-nav { background: #fff; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; padding: 5px 20px; height: 45px; }
        .system-title { font-weight: 700; color: var(--primary-blue); font-size: 18px; }
        .nav-tabs { display: flex; gap: 15px; }
        .tab-link { padding: 10px 15px; cursor: pointer; font-size: 14px; border-bottom: 3px solid transparent; transition: 0.3s; }
        .tab-link.active { border-bottom-color: var(--primary-blue); font-weight: 700; color: var(--primary-blue); }
        .logout-small { font-size: 12px; color: #a80000; cursor: pointer; text-decoration: underline; }
        .content-area { padding: 15px; height: calc(100vh - 80px); overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; background: #fff; font-size: 14px; margin-top: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        th { background: #faf9f8; text-align: right; padding: 12px; border: 1px solid var(--border-color); }
        td { padding: 10px; border: 1px solid var(--border-color); }
        .input-bar { display: flex; gap: 10px; margin-bottom: 15px; align-items: center; flex-wrap: wrap; }
        input { padding: 8px 12px; border: 1px solid var(--border-color); border-radius: 4px; font-size: 14px; }
        button { padding: 8px 18px; background: var(--primary-blue); color: white; border: none; cursor: pointer; border-radius: 4px; font-weight: 600; }
        .btn-green { background: #107c10; } .btn-red { background: #d13438; }
        .btn-small { padding: 4px 8px; font-size: 12px; }
        .hidden { display: none !important; }
        .cart-summary { background: #fff; border: 1px solid var(--border-color); padding: 15px; margin-top: 15px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; }
        .qty-edit { width: 50px; text-align: center; border: 1px dashed var(--primary-blue); cursor: pointer; }
        @media print { body * { visibility: hidden; } #printArea, #printArea * { visibility: visible; } #printArea { position: absolute; right: 0; top: 0; width: 100%; } }
        .login-wrap { height: 100vh; display: flex; justify-content: center; align-items: center; }
        .login-card { background: white; padding: 30px; border: 1px solid var(--border-color); width: 320px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <div id="printArea" class="hidden"></div>

    <div id="loginPage" class="login-wrap">
        <div class="login-card">
            <h3 style="text-align: center; color: var(--primary-blue);">نظام فايـر للمبيعات</h3>
            <div id="authAlert" style="display:none; padding:10px; color:white; border-radius:4px; margin-bottom:10px; text-align:center; font-size:12px;"></div>
            <input type="text" id="loginUser" placeholder="اسم المستخدم" style="width:100%; margin-bottom:15px;">
            <input type="password" id="loginPass" placeholder="كلمة المرور" style="width:100%; margin-bottom:20px;">
            <button onclick="processAuth()" style="width:100%;">دخول</button>
            <p style="text-align:center; font-size:12px; color:#888; margin-top:15px;">اتصل بالمسؤول لإنشاء حساب</p>
        </div>
    </div>

    <div id="mainSystem" class="hidden">
        <nav class="top-nav">
            <div class="system-title">FIRE SYSTEM</div>
            <div class="nav-tabs">
                <div class="tab-link active" onclick="showTab('pos')">شاشة البيع</div>
                <div class="tab-link" onclick="showTab('stock')">المخزن</div>
                <div class="tab-link" onclick="showTab('logs')">سجل الفواتير</div>
            </div>
            <div class="logout-small" onclick="confirmLogout()">تسجيل خروج</div>
        </nav>

        <div class="content-area">
            <div id="posTab">
                <div class="input-bar">
                    <input type="text" id="sellInput" placeholder="امسح الباركود هنا..." style="width: 350px;">
                    <span>اضغط <b>Enter</b> للإضافة</span>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>الكود</th>
                            <th>اسم المنتج</th>
                            <th>الكمية (اضغط للتعديل)</th>
                            <th>حذف</th>
                        </tr>
                    </thead>
                    <tbody id="cartTableBody"></tbody>
                </table>
                <div class="cart-summary">
                    <div><b>إجمالي القطع: <span id="cartTotalQty">0</span></b></div>
                    <div>
                        <button onclick="printReceipt()" style="background:#666;">طباعة ريسيت</button>
                        <button onclick="confirmSale()" class="btn-green">تأكيد البيع وخصم المخزن</button>
                    </div>
                </div>
            </div>

            <div id="stockTab" class="hidden">
                <div class="input-bar">
                    <input type="text" id="pCode" placeholder="الباركود">
                    <input type="text" id="pName" placeholder="اسم المنتج">
                    <input type="number" id="pQty" placeholder="الكمية">
                    <button onclick="updateStock()">حفظ / تعديل</button>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>الباركود</th>
                            <th>اسم المنتج</th>
                            <th>المتاح</th>
                            <th>عمليات</th>
                        </tr>
                    </thead>
                    <tbody id="stockTableBody"></tbody>
                </table>
            </div>

            <div id="logsTab" class="hidden">
                <h3>الفواتير المباعة مؤخراً</h3>
                <table>
                    <thead>
                        <tr>
                            <th>رقم الفاتورة</th>
                            <th>التاريخ</th>
                            <th>التفاصيل</th>
                            <th>إرجاع كامل الفاتورة</th>
                        </tr>
                    </thead>
                    <tbody id="logsTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, updateDoc, increment, collection, onSnapshot, addDoc, query, orderBy, limit, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCVWN1_9_9uNXBfwFpPJUZMSS17cvTQUV4",
        authDomain: "fire-system-4a0c3.firebaseapp.com",
        projectId: "fire-system-4a0c3",
        storageBucket: "fire-system-4a0c3.firebasestorage.app",
        messagingSenderId: "34578512308",
        appId: "1:34578512308:web:d05b93e97cbe0fe30bdae1"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentCart = [];

    // التنقل بين التبويبات
    window.showTab = (tab) => {
        ['pos', 'stock', 'logs'].forEach(t => document.getElementById(t+'Tab').classList.add('hidden'));
        document.getElementById(tab+'Tab').classList.remove('hidden');
        document.querySelectorAll('.tab-link').forEach(el => el.classList.toggle('active', el.onclick.toString().includes(tab)));
        if(tab === 'logs') loadSalesLogs();
    };

    // الدخول والخروج
    window.processAuth = async () => {
        const u = document.getElementById('loginUser').value + "@firesystem.com";
        const p = document.getElementById('loginPass').value;
        try { await signInWithEmailAndPassword(auth, u, p); } 
        catch (e) { alert("خطأ في بيانات الدخول"); }
    };
    window.confirmLogout = () => { if(confirm("هل تريد تسجيل الخروج؟")) signOut(auth).then(()=>location.reload()); };
    onAuthStateChanged(auth, (user) => {
        if(user) { 
            document.getElementById('loginPage').classList.add('hidden'); 
            document.getElementById('mainSystem').classList.remove('hidden');
            loadStockRealtime();
        }
    });

    // --- شاشة البيع ---
    document.getElementById('sellInput').addEventListener('keypress', async (e) => {
        if(e.key === 'Enter') {
            const code = e.target.value.trim();
            const snap = await getDoc(doc(db, "inventory", code));
            if(snap.exists()) {
                const item = currentCart.find(i => i.code === code);
                if(item) item.qty++; else currentCart.push({ code, name: snap.data().name, qty: 1 });
                renderCart();
            } else alert("المنتج غير موجود!");
            e.target.value = '';
        }
    });

    function renderCart() {
        const tbody = document.getElementById('cartTableBody');
        tbody.innerHTML = '';
        let total = 0;
        currentCart.forEach((item, idx) => {
            total += item.qty;
            tbody.innerHTML += `<tr>
                <td>${item.code}</td>
                <td>${item.name}</td>
                <td onclick="editQty(${idx})" class="qty-edit">${item.qty}</td>
                <td><button class="btn-red btn-small" onclick="removeFromCart(${idx})">حذف</button></td>
            </tr>`;
        });
        document.getElementById('cartTotalQty').innerText = total;
    }

    window.editQty = (idx) => {
        const newQty = prompt("أدخل الكمية الجديدة:", currentCart[idx].qty);
        if(newQty && !isNaN(newQty)) {
            currentCart[idx].qty = parseInt(newQty);
            renderCart();
        }
    };

    window.removeFromCart = (idx) => { currentCart.splice(idx, 1); renderCart(); };

    window.confirmSale = async () => {
        if(currentCart.length === 0) return;
        if(!confirm("تأكيد البيع وخصم الكميات؟")) return;
        try {
            const billData = { items: currentCart, time: new Date().toLocaleString() };
            await addDoc(collection(db, "bills"), billData);
            for(let item of currentCart) {
                await updateDoc(doc(db, "inventory", item.code), { quantity: increment(-item.qty) });
            }
            alert("تمت العملية بنجاح");
            currentCart = []; renderCart();
        } catch(e) { alert("حدث خطأ!"); }
    };

    // --- سجل الفواتير ---
    async function loadSalesLogs() {
        const q = query(collection(db, "bills"), orderBy("time", "desc"), limit(10));
        onSnapshot(q, (snap) => {
            const tbody = document.getElementById('logsTableBody');
            tbody.innerHTML = '';
            snap.forEach(d => {
                const data = d.data();
                const details = data.items.map(i => `${i.name} (${i.qty})`).join(' - ');
                tbody.innerHTML += `<tr>
                    <td>${d.id.substring(0,6)}</td>
                    <td>${data.time}</td>
                    <td>${details}</td>
                    <td><button class="btn-red btn-small" onclick="returnBill('${d.id}')">إرجاع الفاتورة</button></td>
                </tr>`;
            });
        });
    }

    window.returnBill = async (billId) => {
        if(!confirm("هل أنت متأكد من إرجاع الفاتورة بالكامل للمخزن؟")) return;
        const snap = await getDoc(doc(db, "bills", billId));
        const items = snap.data().items;
        for(let item of items) {
            await updateDoc(doc(db, "inventory", item.code), { quantity: increment(item.qty) });
        }
        await deleteDoc(doc(db, "bills", billId));
        alert("تم إرجاع المنتجات للمخزن وحذف الفاتورة");
    };

    // --- المخزن ---
    function loadStockRealtime() {
        onSnapshot(collection(db, "inventory"), (snap) => {
            const tbody = document.getElementById('stockTableBody');
            tbody.innerHTML = '';
            snap.forEach(d => {
                const data = d.data();
                tbody.innerHTML += `<tr>
                    <td>${d.id}</td>
                    <td>${data.name}</td>
                    <td>${data.quantity}</td>
                    <td>
                        <button class="btn-small" onclick="editStock('${d.id}','${data.name}',${data.quantity})">تعديل</button>
                        <button class="btn-small btn-green" onclick="printBC('${d.id}')">باركود</button>
                    </td>
                </tr>`;
            });
        });
    }

    window.updateStock = async () => {
        const c = document.getElementById('pCode').value;
        const n = document.getElementById('pName').value;
        const q = parseInt(document.getElementById('pQty').value);
        if(c && n) await setDoc(doc(db, "inventory", c), { name: n, quantity: q }, {merge: true});
        document.querySelectorAll('#stockTab input').forEach(i => i.value = '');
    };

    window.editStock = (c, n, q) => {
        document.getElementById('pCode').value = c;
        document.getElementById('pName').value = n;
        document.getElementById('pQty').value = q;
    };

    window.printBC = (code) => {
        const p = document.getElementById('printArea');
        p.innerHTML = `<div style="text-align:center;"><svg id="bcs"></svg></div>`;
        p.classList.remove('hidden');
        JsBarcode("#bcs", code);
        window.print();
        p.classList.add('hidden');
    };
</script>
</body>
</html>
